name: Release

on:
  push:
    branches:
      - main
      - dev

permissions: write-all

jobs:
  # Tests gate the release: if this job fails, the release job never runs, so we never
  # publish untested code.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Kivy is imported by the dispatcher layer; these let it import headless in CI.
      - name: Install headless Kivy deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libsdl2-2.0-0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        env:
          KIVY_NO_ARGS: "1"
        run: uv run pytest -q

  release:
    needs: test
    runs-on: ubuntu-latest
    concurrency: release
    # Don't run on the version-bump commit semantic-release pushes back.
    if: "!contains(github.event.head_commit.message, 'chore(release):')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Python Semantic Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run semantic-release version
          uv run semantic-release publish
