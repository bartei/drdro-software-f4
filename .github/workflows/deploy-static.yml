name: Deploy static content

# Publishes the drDRO documentation site (website/) to this repo's own subfolder
# on the static content host (self-hosted runner -> rsync over SSH -> nginx-static).
# The "Assemble site" step stages website/ into public/; the deploy step is the
# same mock deploy path and is intentionally left unchanged.

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-static.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          rm -rf public
          mkdir -p public
          # The static site lives in website/ (index.html at its root, assets/ alongside).
          # All links are relative, so it serves correctly from any base path.
          cp -R website/. public/
          test -f public/index.html   # fail fast if the site is missing

      - name: Deploy via rsync
        env:
          DEPLOY_HOST: ${{ secrets.STATIC_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.STATIC_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.STATIC_DEPLOY_PATH }}
          DEPLOY_KEY: ${{ secrets.STATIC_DEPLOY_SSH_KEY }}
        run: |
          umask 077
          echo "$DEPLOY_KEY" > deploy_key
          chmod 600 deploy_key
          trap 'rm -f deploy_key' EXIT

          TARGET_DIR="$DEPLOY_PATH/${{ github.event.repository.name }}"
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i deploy_key"

          ssh $SSH_OPTS "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p $TARGET_DIR"
          rsync -avz --delete \
            --chmod=Du=rwx,Dg=rx,Do=rx,Fu=rw,Fg=r,Fo=r \
            -e "ssh $SSH_OPTS" \
            public/ "$DEPLOY_USER@$DEPLOY_HOST:$TARGET_DIR/"
